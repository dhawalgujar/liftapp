version: '3.9'

services:
  lift:
    build: .
    container_name: lift-app
    ports:
      - "7700:7700"
    volumes:
      - lift-data:/app/backend/data
    environment:
      - PORT=7700
      - TZ=America/New_York
    restart: unless-stopped

volumes:
  lift-data:
    driver: local
