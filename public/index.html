async function executeAIImport() {
  const text = importText.trim();
  if (!text) return;

  importError = null;

  // Get split name from the name input field
  const splitName = document.getElementById('aiImportSplitNameInput')?.value?.trim() || importSplitName || 'Imported Split';

  // Parse the AI output client-side to validate it has structure
  const parsed = parseAIImport(text);
  if (parsed.error) {
    importError = parsed.error;
    renderCreateSplitSheet();
    return;
  }

  // Convert parsed data to the backend's expected text format, using the user's split name
  const backendText = convertToBackendFormat(parsed, splitName);

  try {
    const data = await api('POST', `/api/routines/import`, {
      text: backendText,
      userId: user.id,
      name: splitName
    });
    // Auto-activate the imported split
    await api('PATCH', `/api/users/${user.id}/active-routine`, { routine_id: data.id });
    routines.push(data);
    activeRoutineId = data.id;
    // Refresh routines list
    try {
      const routinesData = await api('GET', `/api/users/${user.id}/routines`);
      routines = Array.isArray(routinesData) ? routinesData : (routinesData.routines || []);
    } catch (e) { /* keep existing routines array */ }
    closeCreateSplit();
    editingRoutineId = data.id;
    // Reload active routine tree
    routine = await api('GET', `/api/users/${user.id}/routine`);
    D = routine.days[0]?.id || null;
    sessions = {};
    W = 1;
    const allLoads = [];
    for (let w = 1; w <= 4; w++) routine.days.forEach(d => allLoads.push(loadSess(w, d.id)));
    await Promise.all(allLoads);
    tab = 'workout';
    renderHeader();
    rc();
  } catch (e) {
    importError = 'Import failed: ' + e.message;
    renderCreateSplitSheet();
  }
}

function convertToBackendFormat(parsed, splitName) {
  let lines = [`Split: ${splitName || parsed.name || 'Imported Split'}`];
  for (const day of parsed.days) {
    lines.push(`Day: ${day.day_label} | ${day.day_name} | ${day.focus || ''}`);
    for (const sec of day.sections) {
      lines.push(`Section: ${sec.name}`);
      for (const ex of sec.exercises) {
        lines.push(`Exercise: ${ex.name} | ${ex.sets || 3} | ${ex.reps || '8-10'}`);
      }
    }
  }
  return lines.join('\n');
}

function parseAIImport(text) {
  // Handles both pipe-delimited format (from AI prompt) and natural-language format.
  // Pipe-delimited: "Day: Label | Name | Focus", "Section: Name", "Exercise: Name | Sets | Reps"
  // Natural: "Day 1: Push", "Chest & Triceps", "Bench Press 3x10 @ 135lb"
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  const days = [];
  let currentDay = null;
  let currentSection = null;
  let routineName = '';

  // Try to extract a routine name from the first heading-like line
  const nameMatch = lines[0]?.match(/^#\s*(.+)/);
  if (nameMatch) routineName = nameMatch[1].trim();

  for (const line of lines) {
    // Skip "Split:" lines — split name is provided by the user in the UI
    if (/^Split:\s*/i.test(line)) continue;

    // ── Pipe-delimited format: Day: Label | Name | Focus ──
    const pipeDay = line.match(/^Day:\s*(.+)/i);
    if (pipeDay) {
      const parts = pipeDay[1].split('|').map(s => s.trim());
      currentDay = {
        day_label: parts[0] || `Day ${days.length + 1}`,
        day_name: parts[1] || parts[0] || `Day ${days.length + 1}`,
        focus: parts[2] || parts[1] || '',
        sections: []
      };
      days.push(currentDay);
      currentSection = null;
      continue;
    }

    // ── Pipe-delimited format: Section: Name ──
    const pipeSection = line.match(/^Section:\s*(.+)/i);
    if (pipeSection && currentDay) {
      currentSection = { name: pipeSection[1].trim(), exercises: [] };
      currentDay.sections.push(currentSection);
      continue;
    }

    // ── Pipe-delimited format: Exercise: Name | Sets | Reps ──
    const pipeEx = line.match(/^Exercise:\s*(.+)/i);
    if (pipeEx && currentDay) {
      const parts = pipeEx[1].split('|').map(s => s.trim());
      const exercise = {
        name: parts[0] || 'Exercise',
        sets: parseInt(parts[1]) || 3,
        reps: parts[2] || '8–10',  // keep reps as string
        weight: 0,
        weight_unit: 'lb'
      };
      if (!currentSection) {
        currentSection = { name: 'Main', exercises: [] };
        currentDay.sections.push(currentSection);
      }
      currentSection.exercises.push(exercise);
      continue;
    }

    // ── Natural format: Day header patterns ──
    const dayMatch = line.match(/^(?:#{1,3}\s*)?(?:Day\s*(\d+)[:\s-]*)(.*)/i)
      || line.match(/^(?:#{1,3}\s*)(.+\s+Day|Day\s+.+)/i);
    if (dayMatch) {
      const label = (dayMatch[2] || dayMatch[1] || '').trim();
      currentDay = {
        day_label: label || `Day ${days.length + 1}`,
        day_name: label || `Day ${days.length + 1}`,
        focus: label,
        sections: []
      };
      days.push(currentDay);
      currentSection = null;
      continue;
    }

    // ── Natural format: Section header ──
    const secMatch = line.match(/^(?:#{1,4}\s*)?([A-Z][a-zA-Z\s&]+)$/);
    if (secMatch && currentDay) {
      currentSection = { name: secMatch[1].trim(), exercises: [] };
      currentDay.sections.push(currentSection);
      continue;
    }

    // ── Natural format: Exercise "Bench Press 3x10 @ 135lb" ──
    const exMatch = line.match(/^(?:\d+\.\s*|[-*]\s*)?([A-Za-z][a-zA-Z\s\-()]+?)\s+(\d+)\s*[xX×]\s*(\d+)(?:\s*@\s*(\d+(?:\.\d+)?)\s*(lb|kg|lbs|kgs?)?)?/);
    if (exMatch && currentDay) {
      const exercise = {
        name: exMatch[1].trim(),
        sets: parseInt(exMatch[2]),
        reps: String(exMatch[3]),  // keep reps as string
        weight: exMatch[4] ? parseFloat(exMatch[4]) : 0,
        weight_unit: exMatch[5] ? (exMatch[5].startsWith('k') ? 'kg' : 'lb') : 'lb'
      };
      if (!currentSection) {
        currentSection = { name: 'Main', exercises: [] };
        currentDay.sections.push(currentSection);
      }
      currentSection.exercises.push(exercise);
      continue;
    }

    // ── Natural format: Simple exercise name ──
    const simpleEx = line.match(/^(?:\d+\.\s*|[-*]\s*)([A-Za-z][a-zA-Z\s\-()]+)/);
    if (simpleEx && currentDay) {
      if (!currentSection) {
        currentSection = { name: 'Main', exercises: [] };
        currentDay.sections.push(currentSection);
      }
      currentSection.exercises.push({
        name: simpleEx[1].trim(),
        sets: 3, reps: '10', weight: 0, weight_unit: 'lb'
      });
    }
  }

  if (days.length === 0) {
    return { error: 'Could not parse any workout days from the input. Make sure your plan has clear day headers (e.g. "Day: Day 1 | Push | Chest") and exercise listings.' };
  }

  return { name: routineName || 'Imported Split', days };
}

// ── Active Splits: Set Active Split ───────────────────────────────────────────
async function setActiveSplit(routineId) {
  if (routineId === activeRoutineId) return;
  const target = routines.find(r => r.id === routineId);
  if (!target) return;

  // Check for incomplete sessions (set_logs use `done`, not `completed`)
  const hasIncomplete = Object.values(sessions).some(s => {
    if (!s?.logs || !s.session) return false;
    if (s.session.completed) return false; // fully completed sessions are fine
    return s.logs.some(l => l.done); // has some progress but not completed
  });

  if (hasIncomplete) {
    showSwitchConfirmation(target);
    return;
  }

  await executeSwitchSplit(routineId);
}

function showSwitchConfirmation(target) {
  showModal('Switch Split?', [
    { label: `You have an in-progress session. Switching will abandon it.`, disabled: true },
    { label: `Switch to "${target.name}"`, cls: 'primary', action: () => executeSwitchSplit(target.id) },
    { label: 'Cancel', action: () => {} }
  ]);
}

async function executeSwitchSplit(routineId) {
  try {
    await api('PATCH', `/api/users/${user.id}/active-routine`, { routine_id: routineId });
    activeRoutineId = routineId;
    // Reload the active routine
    sessions = {};
    W = 1;
    routine = await api('GET', `/api/users/${user.id}/routine`);
    D = routine.days[0]?.id || null;
    const allLoads = [];
    for (let w = 1; w <= 4; w++) routine.days.forEach(d => allLoads.push(loadSess(w, d.id)));
    await Promise.all(allLoads);
    renderHeader();
    rc();
  } catch (e) {
    alert('Failed to switch split: ' + e.message);
  }
}

// ── Active Splits: Delete Split ───────────────────────────────────────────────
function confirmDeleteSplit(routineId) {
  const r = routines.find(r => r.id === routineId);
  if (!r || r.is_default) return;
  showModal(`Delete "${r.name}"?`, [
    { label: 'This cannot be undone. All days and exercises in this split will be permanently deleted.', disabled: true },
    { label: 'Delete Split', cls: 'destructive', action: () => deleteSplit(routineId) },
    { label: 'Cancel', action: () => {} }
  ]);
}

async function deleteSplit(routineId) {
  try {
    await api('DELETE', `/api/routines/${routineId}?user_id=${user.id}`);
    routines = routines.filter(r => r.id !== routineId);
    if (activeRoutineId === routineId) {
      // Backend switched to default; reload active routine
      routine = await api('GET', `/api/users/${user.id}/routine`);
      activeRoutineId = routine?.id || null;
      D = routine?.days?.[0]?.id || null;
      sessions = {};
      const allLoads = [];
      if (routine) for (let w = 1; w <= 4; w++) routine.days.forEach(d => allLoads.push(loadSess(w, d.id)));
      await Promise.all(allLoads);
    }
    renderSettings();
  } catch (e) {
    alert('Failed to delete: ' + e.message);
  }
}

function editSplit(routineId) {
  editingRoutineId = routineId;
  openSplitDays.clear();
  editingExerciseId = null;
  tab = 'workout';
  // Switch to the routine being edited
  const ts = ['workout', 'history', 'progress', 'settings'];

// ── Active Splits: Split Editor ───────────────────────────────────────────────
async function renderSplitEditor() {
  const content = document.getElementById('content');

  // Find or fetch the routine being edited
  try {
    const data = await api('GET', `/api/users/${user.id}/routine?routineId=${editingRoutineId}`);
    editorRoutine = data;
  } catch (e) {
    content.innerHTML = `<div style="padding:20px;text-align:center;color:var(--t2)">Failed to load split. <button onclick="exitSplitEditor()" style="color:var(--accent);background:none;border:none;cursor:pointer;font-family:inherit">Go back</button></div>`;
    return;
  }

  let h = `<div class="split-editor">`;

  // Header with back button
  h += `<div class="split-editor-header">
    <button class="split-editor-back" onclick="exitSplitEditor()">← Back</button>
    <span class="split-editor-name">${escapeHtml(editorRoutine.name)}</span>
    <div class="split-editor-actions">
      <button class="split-editor-rename-btn" onclick="renameSplit('${editingRoutineId}')">Rename</button>
      <button class="split-editor-done-btn" onclick="exitSplitEditor()">Done</button>
    </div>
  </div>`;

  // Render each day
  for (const day of editorRoutine.days || []) {
    const exCount = (day.sections || []).reduce((sum, s) => sum + (s.exercises?.length || 0), 0);
    const isOpen = openSplitDays.has(day.id);
    h += `<div class="split-day-card">`;
    h += `<div class="split-day-header" onclick="toggleSplitDay(this, '${day.id}')">`;
    h += `<div>
        <div class="split-day-label">${escapeHtml(day.day_label)} — ${escapeHtml(day.day_name)}</div>
        <div class="split-day-meta">${exCount} exercise${exCount !== 1 ? 's' : ''} · ${day.focus || ''}</div>
      </div>
      <span class="split-day-chevron${isOpen ? ' open' : ''}">▶</span>
    </div>`;
    h += `<div class="split-day-body" style="display:${isOpen ? 'block' : 'none'}">`;

    for (const sec of day.sections || []) {
      h += `<div class="split-section-label">${escapeHtml(sec.name)}
        <div style="display:flex;gap:4px;float:right">
          <button class="split-ex-action" onclick="event.stopPropagation(); renameSectionInEditor('${sec.id}','${escapeHtml(sec.name).replace(/'/g, "\\'")}')" title="Rename section">✎</button>
          <button class="split-ex-action del" onclick="event.stopPropagation(); confirmDelSectionInEditor('${day.id}','${sec.id}')" title="Delete section">✕</button>
        </div>
      </div>`;

      for (const ex of sec.exercises || []) {
        h += renderSplitExerciseItem(ex, day.id, sec.id);
      }

      h += `<button class="split-add-ex-btn" onclick="event.stopPropagation(); addExToSection('${day.id}','${sec.id}')">+ Add Exercise</button>`;
    }

    // Always show "Add Section" button at bottom of day
    h += `<button class="split-add-ex-btn" style="margin-top:4px" onclick="event.stopPropagation(); addSectionToDayInEditor('${day.id}')">+ Add Section</button>`;

    h += `<div class="split-day-actions">
      <button class="split-day-action-btn rename" onclick="event.stopPropagation(); renameDayInEditor('${day.id}')">Rename Day</button>
      <button class="split-day-action-btn delete" onclick="event.stopPropagation(); confirmDelDayInEditor('${day.id}')">Delete Day</button>
    </div>`;

    h += `</div>`; // split-day-body
    h += `</div>`; // split-day-card
  }

  h += `<button class="split-add-day-btn" onclick="addDayToSplit()">+ Add Day</button>`;

  h += `</div>`; // .split-editor
  content.innerHTML = h;
}

function toggleSplitDay(headerEl, dayId) {
  const body = headerEl.nextElementSibling;
  const chevron = headerEl.querySelector('.split-day-chevron');
  if (body.style.display === 'none') {
    body.style.display = 'block';
    chevron.classList.add('open');
    openSplitDays.add(dayId);
  } else {
    body.style.display = 'none';
    chevron.classList.remove('open');
    openSplitDays.delete(dayId);
  }
}

function exitSplitEditor() {
  editingRoutineId = null;
  editingExerciseId = null;
  editorRoutine = null;
  openSplitDays.clear();
  tab = 'settings';
  const ts = ['workout', 'history', 'progress', 'settings'];
  document.querySelectorAll('.nav-btn').forEach((b, i) => b.classList.toggle('on', ts[i] === 'settings'));
  renderHeader();
  rc();
}

  editingExerciseId = exerciseId;
  rc();

    const input = document.getElementById(`inlineExName_${exerciseId}`);
    if (input) { input.focus(); input.select(); }
  }, 50);
}

async function saveInlineEdit(exerciseId, dayId, sectionId) {
  const input = document.getElementById(`inlineExName_${exerciseId}`);
  if (!input) return;
  const newName = input.value.trim();
  if (!newName) { cancelInlineEdit(); return; }

  try {
    await api('PATCH', `/api/exercises/${exerciseId}`, { name: newName });
    editingExerciseId = null;
    rc();
  } catch (e) {
    alert('Failed to save: ' + e.message);
  }
}

function cancelInlineEdit() {
  editingExerciseId = null;
  rc();
}

// ── Active Splits: Exercise Item Rendering ─────────────────────────────────────
function renderSplitExerciseItem(ex, dayId, sectionId) {
  const setsReps = ex.sets ? `${ex.sets}×${ex.reps || '?'}` : '';
  const weight = ex.weight ? `${ex.weight}${ex.weight_unit || 'lb'}` : '';

  return `<div class="split-ex-item" data-ex-id="${ex.id}" data-day-id="${dayId}" data-section-id="${sectionId}"
    draggable="true"
    ondragstart="handleSplitDragStart(event)"
    ondragover="handleSplitDragOver(event)"
    ondragleave="handleSplitDragLeave(event)"
    ondrop="handleSplitDrop(event)"
    ondragend="handleSplitDragEnd(event)"
    onclick="openSplitExEditor('${ex.id}')">
    <span class="split-ex-drag" title="Drag to reorder"
      ontouchstart="handleSplitTouchStart(event, '${dayId}', '${sectionId}', '${ex.id}')"
      ontouchmove="handleSplitTouchMove(event)"
      ontouchend="handleSplitTouchEnd(event)"
      onclick="event.stopPropagation()">⋮⋮</span>
    <span class="split-ex-name">${escapeHtml(ex.name)}</span>
    <span class="split-ex-details">${setsReps}${weight ? ' @ ' + weight : ''}</span>
    <div class="split-ex-actions">
      <button class="split-ex-action del" onclick="event.stopPropagation(); deleteExercise('${dayId}','${sectionId}','${ex.id}')" title="Delete">✕</button>
    </div>
  </div>`;
}

// ── Active Splits: Reorder ────────────────────────────────────────────────────
async function moveExercise(dayId, sectionId, exerciseId, direction) {
  // Find the routine being edited
  let editorRoutine;
  try {
    editorRoutine = await api('GET', `/api/users/${user.id}/routine?routineId=${editingRoutineId}`);
  } catch (e) { return; }

  const day = editorRoutine.days?.find(d => d.id === dayId);
  const sec = day?.sections?.find(s => s.id === sectionId);
  if (!sec?.exercises) return;

  const idx = sec.exercises.findIndex(e => e.id === exerciseId);
  if (idx === -1) return;
  const newIdx = direction === 'up' ? idx - 1 : idx + 1;
  if (newIdx < 0 || newIdx >= sec.exercises.length) return;

  // Swap locally
  const temp = sec.exercises[idx];
  sec.exercises[idx] = sec.exercises[newIdx];
  sec.exercises[newIdx] = temp;

  // Update sort_order via API
  try {
    for (let i = 0; i < sec.exercises.length; i++) {
      await api('PATCH', `/api/exercises/${sec.exercises[i].id}`, { sort_order: i });
    }
    rc();
  } catch (e) {
    alert('Failed to reorder: ' + e.message);
  }
}

// ── Active Splits: Delete Exercise ────────────────────────────────────────────
async function deleteExercise(dayId, sectionId, exerciseId) {
  if (!confirm('Delete this exercise?')) return;
  try {
    await api('DELETE', `/api/exercises/${exerciseId}`);
    rc();
  } catch (e) {
    alert('Failed to delete: ' + e.message);
  }
}

// ── Active Splits: Exercise Editor Sheet ──────────────────────────────────────
function findExerciseInEditor(exId) {
  if (!editorRoutine?.days) return null;
  for (const d of editorRoutine.days)
    for (const s of d.sections || [])
      for (const e of s.exercises || [])
        if (e.id === exId) return e;
  return null;
}

function openSplitExEditor(exId) {
  const ex = findExerciseInEditor(exId);
  if (!ex) return;
  splitExEditorExId = exId;
  document.getElementById('splitExEditorName').value = ex.name || '';
  document.getElementById('splitExEditorSets').value = ex.sets || 3;
  document.getElementById('splitExEditorReps').value = ex.reps || '8-10';
  document.getElementById('splitExEditorOverlay').classList.add('open');
  setTimeout(() => document.getElementById('splitExEditorName')?.focus(), 100);
}

function closeSplitExEditor(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById('splitExEditorOverlay').classList.remove('open');
  splitExEditorExId = null;
}

async function saveSplitExEditor() {
  const name = document.getElementById('splitExEditorName')?.value?.trim();
  const sets = parseInt(document.getElementById('splitExEditorSets')?.value) || 3;
  const reps = document.getElementById('splitExEditorReps')?.value?.trim() || '8-10';
  if (!name) return;
  try {
    await api('PATCH', `/api/exercises/${splitExEditorExId}`, { name, sets, reps });
    closeSplitExEditor();
    rc();
  } catch (e) { alert('Failed to save: ' + e.message); }
}

async function addExToSection(dayId, sectionId) {

    await api('POST', `/api/sections/${sectionId}/exercises`, {
      name: 'New Exercise',
      sets: 3,
      reps: '10',
      weight: 0,
      weight_unit: 'lb'
    });

  }

// ── Active Splits: Section / Day Management ───────────────────────────────────
function confirmDelDayInEditor(dayId) {

async function delDayInEditor(dayId) {

    await api('DELETE', `/api/days/${dayId}`);

    rc();

function confirmDelSectionInEditor(dayId, sectionId) {

async function delSectionInEditor(sectionId) {

    await api('DELETE', `/api/sections/${sectionId}`);

function renameSectionInEditor(sectionId, currentName) {
  // Show a modal with input field for new name
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'rename-section-overlay';
  overlay.onclick = e => { if (e.target === overlay) overlay.remove(); };

  overlay.innerHTML = `
    <div class="modal-sheet">
      <div class="modal-title">Rename Section</div>
      <input id="renameSectionInput" class="add-ex-input" type="text" value="${escapeHtml(currentName)}" placeholder="Section name" />
      <button class="modal-btn" onclick="saveRenameSectionInEditor('${sectionId}')">Save</button>
      <button class="modal-btn cancel" onclick="document.getElementById('rename-section-overlay').remove()">Cancel</button>
    </div>
  `;
  document.body.appendChild(overlay);

  // Focus and select the input
  setTimeout(() => {
    const input = document.getElementById('renameSectionInput');
    if (input) { input.focus(); input.select(); }
  }, 50);
}

async function saveRenameSectionInEditor(sectionId) {
  const input = document.getElementById('renameSectionInput');
  const newName = input?.value?.trim();
  if (!newName) return;

  try {
    await api('PATCH', `/api/sections/${sectionId}`, { name: newName });

    // Update local state in the editing routine's days
    if (editingRoutineId && editorRoutine) {
      for (const day of editorRoutine.days || []) {
        for (const section of day.sections || []) {
          if (section.id === sectionId) {
            section.name = newName;
            break;
          }
        }
      }
    }

    document.getElementById('rename-section-overlay')?.remove();
    renderSplitEditor();
  } catch (e) { console.error(e); }
}

async function addDayToSplit() {
  try {
    const dayNum = (editorRoutine && editorRoutine.days) ? editorRoutine.days.length + 1 : 1;
    const day = await api('POST', `/api/routines/${editingRoutineId}/days`, {
      day_label: `Day ${dayNum}`,
      day_name: 'New Day',
      focus: 'Focus'
    });
    // Auto-create a default section so exercises can be added immediately
    const section = await api('POST', `/api/days/${day.id}/sections`, { name: 'Main' });
    day.sections = [{ ...section, exercises: [] }];
    openSplitDays.add(day.id);
    rc();
  } catch (e) {
    alert('Failed to add day: ' + e.message);
  }
}

function renameDayInEditor(dayId) {
  const day = editorRoutine && editorRoutine.days ? editorRoutine.days.find(d => d.id === dayId) : null;
  if (!day) return;
  document.getElementById('renameDayId').value = dayId;
  document.getElementById('renameDayLabel').value = day.day_label;
  document.getElementById('renameDayName').value = day.day_name;
  document.getElementById('renameDayFocus').value = day.focus || '';
  document.getElementById('renameDayPanel').style.display = 'block';

function renameSplit(routineId) {
  showModal('Rename Split', [
    { label: 'Enter new name:', input: { id: 'renameSplitInput', placeholder: 'Split name' } },
    { label: 'Save', cls: 'primary', action: async () => {
      const val = document.getElementById('renameSplitInput')?.value?.trim();
      if (!val) return;
      try {
        await api('PATCH', `/api/routines/${routineId}`, { name: val, user_id: user.id });
        const r = routines.find(r => r.id === routineId);
        if (r) r.name = val;
        rc();
      } catch (e) { alert('Failed to rename: ' + e.message); }
    }},
    { label: 'Cancel', action: () => {} }
  ]);
}

// ── Active Splits: Add Section to Day ─────────────────────────────────────────
async function addSectionToDayInEditor(dayId) {
  try {
    const section = await api('POST', `/api/days/${dayId}/sections`, { name: 'New Section' });
    // Update local editor routine
    if (editorRoutine && editorRoutine.days) {
      const day = editorRoutine.days.find(d => d.id === dayId);
      if (day) {
        if (!day.sections) day.sections = [];
        day.sections.push({ ...section, exercises: [] });
      }
    }
    openSplitDays.add(dayId);
    rc();
  } catch (e) {
    alert('Failed to add section: ' + e.message);
  }
}

// ── Split Editor: Drag and Drop (Desktop) ─────────────────────────────────────
function handleSplitDragStart(e) {
  const item = e.target.closest('.split-ex-item');
  if (!item) return;
  splitDragSrcEl = item;
  item.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', item.dataset.exId || '');
}

function handleSplitDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const target = e.target.closest('.split-ex-item');
  if (target && target !== splitDragSrcEl && target.dataset.sectionId === (splitDragSrcEl && splitDragSrcEl.dataset.sectionId)) {
    target.classList.add('drag-over');
  }
}

function handleSplitDragLeave(e) {
  const target = e.target.closest('.split-ex-item');
  if (target) target.classList.remove('drag-over');
}

function handleSplitDrop(e) {
  e.preventDefault();
  const target = e.target.closest('.split-ex-item');
  if (!target || target === splitDragSrcEl) { handleSplitDragEnd(e); return; }

  // Only allow reorder within the same section
  if (!splitDragSrcEl || splitDragSrcEl.dataset.sectionId !== target.dataset.sectionId) {
    handleSplitDragEnd(e);
    return;
  }

  const parent = splitDragSrcEl.parentNode;
  const srcIdx = [...parent.children].filter(c => c.classList.contains('split-ex-item')).indexOf(splitDragSrcEl);
  const tgtIdx = [...parent.children].filter(c => c.classList.contains('split-ex-item')).indexOf(target);

  if (srcIdx < tgtIdx) {
    parent.insertBefore(splitDragSrcEl, target.nextSibling);
  } else {
    parent.insertBefore(splitDragSrcEl, target);
  }

  // Persist new order
  saveSplitExerciseOrder(target.dataset.sectionId);
  handleSplitDragEnd(e);
}

function handleSplitDragEnd(e) {
  document.querySelectorAll('.split-ex-item').forEach(el => {
    el.classList.remove('dragging', 'drag-over');
  });
  splitDragSrcEl = null;
}

// ── Split Editor: Touch Drag (Mobile) ────────────────────────────────────────
function handleSplitTouchStart(e, dayId, sectionId, exerciseId) {
  const touch = e.touches[0];
  const item = e.target.closest('.split-ex-item');
  if (!item) return;
  splitTouchState = {
    item, dayId, sectionId, exerciseId,
    startY: touch.clientY, startX: touch.clientX,
    moved: false, clone: null
  };
}

function handleSplitTouchMove(e) {
  if (!splitTouchState) return;
  const touch = e.touches[0];
  const dy = touch.clientY - splitTouchState.startY;
  const dx = touch.clientX - splitTouchState.startX;

  if (!splitTouchState.moved && (Math.abs(dy) > 10 || Math.abs(dx) > 10)) {
    splitTouchState.moved = true;
    // Create a visual clone for drag feedback
    const clone = splitTouchState.item.cloneNode(true);
    clone.style.position = 'fixed';
    clone.style.width = splitTouchState.item.offsetWidth + 'px';
    clone.style.zIndex = '9999';
    clone.style.opacity = '0.85';
    clone.style.pointerEvents = 'none';
    clone.style.boxShadow = '0 4px 16px rgba(0,0,0,0.25)';
    clone.style.borderRadius = '8px';
    document.body.appendChild(clone);
    splitTouchState.clone = clone;
    splitTouchState.item.style.opacity = '0.3';
  }

  if (splitTouchState.moved && splitTouchState.clone) {
    e.preventDefault();
    const rect = splitTouchState.item.getBoundingClientRect();
    splitTouchState.clone.style.top = (touch.clientY - rect.height / 2) + 'px';
    splitTouchState.clone.style.left = rect.left + 'px';

    // Highlight drop target
    document.querySelectorAll('.split-ex-item.drag-over').forEach(el => el.classList.remove('drag-over'));
    const elBelow = document.elementFromPoint(touch.clientX, touch.clientY);
    const target = elBelow && elBelow.closest('.split-ex-item');
    if (target && target !== splitTouchState.item && target.dataset.sectionId === splitTouchState.sectionId) {
      target.classList.add('drag-over');
    }
  }
}

function handleSplitTouchEnd(e) {
  if (!splitTouchState) return;

  if (splitTouchState.moved) {
    const touch = e.changedTouches[0];
    const elBelow = document.elementFromPoint(touch.clientX, touch.clientY);
    const target = elBelow && elBelow.closest('.split-ex-item');

    if (target && target !== splitTouchState.item && target.dataset.sectionId === splitTouchState.sectionId) {
      const parent = splitTouchState.item.parentNode;
      const srcIdx = [...parent.children].filter(c => c.classList.contains('split-ex-item')).indexOf(splitTouchState.item);
      const tgtIdx = [...parent.children].filter(c => c.classList.contains('split-ex-item')).indexOf(target);

      if (srcIdx < tgtIdx) {
        parent.insertBefore(splitTouchState.item, target.nextSibling);
      } else {
        parent.insertBefore(splitTouchState.item, target);
      }

      saveSplitExerciseOrder(splitTouchState.sectionId);
    }

    if (splitTouchState.clone) splitTouchState.clone.remove();
    splitTouchState.item.style.opacity = '';
    document.querySelectorAll('.split-ex-item.drag-over').forEach(el => el.classList.remove('drag-over'));
  }

  splitTouchState = null;
}

async function saveSplitExerciseOrder(sectionId) {
  const items = [...document.querySelectorAll(`.split-ex-item[data-section-id="${sectionId}"]`)];
  try {
    for (let i = 0; i < items.length; i++) {
      await api('PATCH', `/api/exercises/${items[i].dataset.exId}`, { sort_order: i });
    }
  } catch (e) { console.error(e); }
}

function renderSettings() {
  const content = document.getElementById('content');
  const currentTheme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
  const currentAccent = localStorage.getItem('lift-accent') || DEFAULT_ACCENT;

  let h = `<div class="settings-panel">`;

  // Active Split section
  h += renderSplitList();

  // Theme toggle
  h += `<div class="section-lbl"><span>Appearance</span></div>`;
  h += `<div class="theme-toggle">`;
  h += renderThemeCard('light', 'Light', currentTheme);
  h += renderThemeCard('dark', 'Dark', currentTheme);
  h += `</div>`;

  // Accent color grid
  h += `<div class="section-lbl"><span>Accent Color</span></div>`;
  h += `<div class="accent-grid">`;
  for (const [hex, preset] of Object.entries(ACCENT_PRESETS)) {
    const isSelected = hex === currentAccent;
    h += `<button class="accent-swatch${isSelected ? ' on' : ''}"
            onclick="setAccent('${hex}')"
            style="background:${hex}"
            title="${preset.label}"
            aria-label="${preset.label} accent color">
            <span class="accent-check">\u2713</span>
          </button>`;
  }
  h += `</div>`;

  // Footer
  h += `<div class="settings-footer">LIFT &middot; Your workout tracker</div>`;
  h += `</div>`;

  content.innerHTML = h;
}

function renderThemeCard(theme, label, currentTheme) {
  const isActive = theme === currentTheme;
  return `<button class="theme-card${isActive ? ' on' : ''}" onclick="setTheme('${theme}')" aria-label="${label} theme">
    <div class="theme-preview theme-preview-${theme}">
      <div class="tp-bar"></div>
      <div class="tp-card"></div>
      <div class="tp-card short"></div>
    </div>
    <span class="theme-label">${label}</span>
    <span class="theme-check">\u2713</span>
  </button>`;
}

function setTheme(theme) {
  if (theme === 'dark') {
    document.documentElement.classList.add('dark');
  } else {
    document.documentElement.classList.remove('dark');
  }
  localStorage.setItem('lift-theme', theme);
  if (tab === 'settings') renderSettings();
}

function setAccent(hex) {
  const preset = ACCENT_PRESETS[hex];
  if (!preset) return;
  const s = document.documentElement.style;
  s.setProperty('--accent', preset.base);
  s.setProperty('--accent-dark', preset.dark);
  s.setProperty('--accent-soft', preset.soft);
  localStorage.setItem('lift-accent', hex);
  if (tab === 'settings') renderSettings();
}

// ── Boot ──────────────────────────────────────────────────────────────────────
(async () => {
  // Load saved theme preferences (already applied by head script, but restore accent for JS)
  const savedAccent = localStorage.getItem('lift-accent');
  if (savedAccent && ACCENT_PRESETS[savedAccent]) {
    const s = document.documentElement.style;
    const p = ACCENT_PRESETS[savedAccent];
    s.setProperty('--accent', p.base);
    s.setProperty('--accent-dark', p.dark);
    s.setProperty('--accent-soft', p.soft);
  }

  const saved = localStorage.getItem('lift-user');
  if (saved) {
    try {
      user = JSON.parse(saved);
      await initApp();
    } catch (e) {
      localStorage.removeItem('lift-user');
    }
  }
})();
</script>
