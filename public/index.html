<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LIFT">
<title>LIFT — Workout Tracker</title>
<script>
(function() {
  try {
    var t = localStorage.getItem('lift-theme');
    if (t === 'dark') document.documentElement.classList.add('dark');
    var a = localStorage.getItem('lift-accent');
    if (a) {
      // ⚠️ KEEP IN SYNC with ACCENT_PRESETS in main <script> block
      var presets = {
        '#E8944A': { base: '#E8944A', dark: '#C46D22', soft: 'rgba(232,148,74,0.15)' },
        '#4A90D9': { base: '#4A90D9', dark: '#2D6BB5', soft: 'rgba(74,144,217,0.15)' },
        '#5B8C5A': { base: '#5B8C5A', dark: '#3D6E3C', soft: 'rgba(91,140,90,0.15)' },
        '#9B59B6': { base: '#9B59B6', dark: '#7D3C98', soft: 'rgba(155,89,182,0.15)' },
        '#E74C3C': { base: '#E74C3C', dark: '#C0392B', soft: 'rgba(231,76,60,0.15)' },
        '#1ABC9C': { base: '#1ABC9C', dark: '#16A085', soft: 'rgba(26,188,156,0.15)' },
        '#F39C12': { base: '#F39C12', dark: '#D68910', soft: 'rgba(243,156,18,0.15)' },
        '#E91E63': { base: '#E91E63', dark: '#C2185B', soft: 'rgba(233,30,99,0.15)' },
        '#607D8B': { base: '#607D8B', dark: '#455A64', soft: 'rgba(96,125,139,0.15)' },
        '#795548': { base: '#795548', dark: '#5D4037', soft: 'rgba(121,85,72,0.15)' }
      };
      var p = presets[a];
      if (p) {
        var s = document.documentElement.style;
        s.setProperty('--accent', p.base);
        s.setProperty('--accent-dark', p.dark);
        s.setProperty('--accent-soft', p.soft);
      }
    }
  } catch(e) {}
})();
</script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/geist-mono@latest/400.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/geist-mono@latest/500.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/geist-mono@latest/600.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/geist-mono@latest/700.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/geist-mono@latest/800.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #FDF8F3;
  --s1: #FFFFFF;
  --s2: #F3ECE2;
  --border: #DDD4C6;
  --text: #2D2418;
  --t2: #8A7A68;
  --accent: #E8944A;
  --accent-dark: #C46D22;
  --accent-soft: rgba(232,148,74,0.15);
  --input-bg: #F5EFE6;
  --shadow: 0 1px 4px rgba(0,0,0,0.06), 0 2px 8px rgba(0,0,0,0.04);
  --tr: background 0.25s ease, color 0.25s ease, border-color 0.25s ease;
}

/* ── Dark Theme ── */
.dark {
  --bg: #121212;
  --s1: #1E1E1E;
  --s2: #2A2A2A;
  --border: #3A3A3A;
  --text: #F0F0F0;
  --t2: #9E9E9E;
  --input-bg: #2A2A2A;
  --shadow: 0 1px 4px rgba(0,0,0,0.3), 0 2px 8px rgba(0,0,0,0.2);
}

html, body {
  background: var(--bg); color: var(--text);
  font-family: 'Geist Mono', monospace;
  height: 100%; overflow-x: hidden;
}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
input[type=number] { -moz-appearance: textfield; }

#app { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }

/* ── Login Screen ── */
#login-screen {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 24px; padding: 32px; z-index: 1000;
}
.login-logo { font-size: 22px; font-weight: 900; letter-spacing: 8px; color: var(--accent-dark); margin-bottom: 4px; }
.login-sub { font-size: 13px; color: var(--t2); margin-bottom: 8px; text-align: center; }
.login-card { background: var(--s1); border-radius: 18px; padding: 28px 24px; width: 100%; max-width: 340px; box-shadow: var(--shadow); border: 1px solid var(--border); }
.login-label { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; color: var(--t2); text-transform: uppercase; margin-bottom: 8px; }
.login-input {
  width: 100%; padding: 14px 16px; border-radius: 12px;
  border: 1.5px solid var(--border); background: var(--input-bg);
  font-size: 16px; color: var(--text); outline: none;
  transition: border-color 0.2s;
}
.login-input:focus { border-color: var(--accent-dark); }
.login-btn {
  width: 100%; margin-top: 16px; padding: 14px;
  background: var(--accent-dark); color: #fff;
  border: none; border-radius: 12px; font-size: 15px;
  font-weight: 700; cursor: pointer; letter-spacing: 0.5px;
  transition: opacity 0.15s;
}
.login-btn:active { opacity: 0.8; }
.login-user-hint { font-size: 11px; color: var(--t2); text-align: center; margin-top: 10px; }
.login-error { font-size: 12px; color: var(--accent-dark); text-align: center; margin-top: 6px; }

/* ── Header ── */
#header { padding: 52px 16px 0; background: var(--bg); position: sticky; top: 0; z-index: 50; }
#content { flex: 1; padding: 12px 12px calc(140px + env(safe-area-inset-bottom)); }
#bottom-nav {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 480px; background: var(--s1);
  border-top: 1px solid var(--border); display: flex; z-index: 100;
  padding-bottom: calc(env(safe-area-inset-bottom) + 12px); box-shadow: var(--shadow);
}

.top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.app-name { font-size: 17px; font-weight: 900; letter-spacing: 6px; color: var(--accent-dark); }
.right-row { display: flex; align-items: center; gap: 10px; }
.user-chip {
  display: flex; align-items: center; gap: 6px; padding: 5px 10px;
  background: var(--s2); border-radius: 20px; border: 1px solid var(--border);
  font-size: 11px; font-weight: 600; color: var(--text); cursor: pointer;
}
.user-chip .avatar { width: 18px; height: 18px; border-radius: 50%; background: var(--accent-dark); color: #fff; font-size: 9px; font-weight: 800; display: flex; align-items: center; justify-content: center; }

.week-tabs { display: flex; gap: 4px; }
.week-tab {
  min-width: 36px; height: 28px; border-radius: 7px; border: 1px solid var(--border);
  background: transparent; color: var(--t2); font-size: 10px; font-weight: 700;
  cursor: pointer; font-family: 'Geist Mono', monospace; transition: all 0.15s;
  padding: 0 6px; position: relative;
}
.week-tab.on { background: var(--accent-dark); color: #fff; border-color: var(--accent-dark); }
.week-tab.done-wk { background: var(--accent-dark); border-color: var(--accent-dark); color: #fff; }
.week-tab.done-wk.on { background: var(--accent-dark); color: #fff; }
.week-tab.has-dot::after {
  content: ''; position: absolute; top: 2px; right: 3px; width: 6px; height: 6px;
  background: var(--accent-dark); border-radius: 50%;
}
.dark .week-tab.has-dot::after,
.week-tab.on.has-dot::after,
.week-tab.done-wk.has-dot::after {
  background: #fff;
}

.day-tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
.day-tab-wrap { flex: 1 1 76px; max-width: 120px; position: relative; }
.day-del-btn {
  position: absolute; top: -6px; right: -6px; width: 20px; height: 20px;
  border-radius: 50%; background: var(--accent-dark); color: #fff; border: none;
  font-size: 13px; line-height: 1; cursor: pointer; z-index: 10;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 1px 4px rgba(0,0,0,0.25);
}
.add-day-btn {
  flex: 0 0 auto; min-width: 36px; height: auto; padding: 10px 10px;
  border-radius: 11px; border: 1px dashed var(--border);
  background: transparent; cursor: pointer; color: var(--t2);
  font-size: 18px; line-height: 1; display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.add-day-btn:active { background: var(--accent-dark); color: #fff; border-color: var(--accent-dark); }
.add-day-panel {
  background: var(--s1); border-radius: 13px; border: 1px dashed var(--border);
  padding: 14px; margin-bottom: 9px;
}
.day-tab {
  width: 100%; padding: 10px 6px; border-radius: 11px; border: 1px solid var(--border);
  background: var(--s1); cursor: pointer; text-align: center;
  transition: all 0.2s; box-shadow: var(--shadow); user-select: none; -webkit-user-select: none;
}
.day-tab.on { background: var(--accent-dark); border-color: var(--accent-dark); color: #fff; }
.day-tab .dl { font-size: 13px; font-weight: 600; color: var(--text); }
.day-tab .ds { font-size: 10px; margin-top: 2px; color: var(--t2); font-weight: 500; }
.day-tab.on .dl { color: #fff; }
.day-tab.on .ds { color: #fff; }
.day-tab.done { background: var(--accent-dark); border-color: var(--accent-dark); color: #fff; }
.day-tab.done .dl { color: #fff; }
.day-tab.done .ds { color: #fff; }

.session-bar { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.focus-txt { font-size: 14px; font-weight: 600; }
.rir-txt { font-size: 11px; color: var(--t2); margin-top: 3px; }
.pct-big { font-size: 32px; font-weight: 800; font-family: 'Geist Mono', monospace; color: var(--accent-dark); line-height: 1; }
.pct-sub { font-size: 10px; color: var(--t2); text-align: right; font-family: 'Geist Mono', monospace; }
.prog-track { height: 3px; background: var(--border); border-radius: 2px; margin-bottom: 12px; }
.prog-fill { height: 3px; background: var(--accent-dark); border-radius: 2px; transition: width 0.4s ease; }

/* ── Nav ── */
.nav-btn {
  flex: 1; padding: 16px 0 14px; background: transparent; border: none;
  color: var(--t2); font-size: 12px; font-weight: 500; cursor: pointer;
  border-bottom: 2px solid transparent; transition: all 0.15s;
}
.nav-btn.on { color: var(--accent-dark); border-bottom: 2px solid var(--accent-dark); }

/* ── Cards ── */
.section-lbl {
  font-size: 9px; font-weight: 800; letter-spacing: 2.5px; color: var(--t2);
  text-transform: uppercase; padding: 16px 4px 8px;
  display: flex; align-items: center; justify-content: space-between;
}
.add-section-btn {
  font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
  color: #fff; background: var(--accent-dark); border: none;
  border-radius: 6px; padding: 3px 8px; cursor: pointer;
}
.section-menu-btn {
  width: 26px; height: 26px; border-radius: 7px; border: 1px solid var(--border);
  background: transparent; color: var(--text); font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  letter-spacing: -2px;
}
.section-menu-btn:active { background: var(--s2); }

.ex-card { background: var(--s1); border-radius: 13px; border: 1px solid var(--border); overflow: hidden; box-shadow: var(--shadow); }
.ex-card.all-done { background: var(--accent-dark); border-color: var(--accent-dark); color: #fff; }
.ex-head { display: flex; justify-content: space-between; align-items: center; padding: 13px 14px; cursor: pointer; }
.ex-name { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
.ex-meta { font-size: 11px; font-family: 'Geist Mono', monospace; font-weight: 700; }
.ex-badge { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.ex-count { font-size: 12px; font-family: 'Geist Mono', monospace; font-weight: 700; color: var(--t2); background: var(--s2); padding: 3px 9px; border-radius: 20px; }
.ex-count.done { color: #fff; background: var(--accent-dark); }
.chev { font-size: 8px; color: var(--text); }
.ex-card-wrap { position: relative; overflow: hidden; margin-bottom: 9px; padding: 3px; }
.ex-swipe-reveal {
  position: absolute; top: 3px; right: 3px; bottom: 3px; width: 70px;
  background: var(--accent-dark); display: flex; align-items: center; justify-content: flex-start;
  padding-left: 18px; border-radius: 13px; transform: translateX(calc(100% + 3px)); transition: transform 0.2s ease;
}
.ex-card-wrap.swiped .ex-swipe-reveal { transform: translateX(0); }
.ex-card-wrap.swiped .ex-card { transform: translateX(-70px); }
.del-ex-btn-swipe {
  width: 40px; height: 40px; border-radius: 10px; border: none;
  background: rgba(255,255,255,0.25); color: #fff; font-size: 20px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
}

/* ── Sets ── */
.sets-wrap { border-top: 1px solid var(--border); padding: 2px 12px 10px; }
.set-heads { display: flex; align-items: center; gap: 4px; padding: 8px 0 4px; font-size: 9px; letter-spacing: 1.5px; color: var(--text); font-weight: 700; font-family: 'Geist Mono', monospace; }
.set-row { display: flex; align-items: center; gap: 4px; padding: 6px 0; border-bottom: 1px solid var(--border); }
.set-row:last-child { border-bottom: none; }
.set-row.done-row { opacity: 0.45; }
.set-n { width: 26px; font-size: 11px; font-family: 'Geist Mono', monospace; color: var(--text); font-weight: 700; }

.set-input[readonly] { background: var(--s2); border-color: var(--border); color: var(--text); cursor: default; }
.set-input[readonly].done-inp { color: #fff; border-color: var(--accent-dark); background: var(--accent-dark); }

.set-input {
  flex: 1.2; background: var(--input-bg); border: 1.5px solid var(--border);
  border-radius: 8px; padding: 8px 4px; color: var(--text); font-size: 15px;
  font-family: 'Geist Mono', monospace; text-align: center; width: 100%;
  transition: border-color 0.15s; font-weight: 700;
}
.set-input:focus { outline: none; border-color: var(--accent-dark); }
.set-input.done-inp { border-color: var(--accent-dark); color: #fff; background: var(--accent-dark); }

.done-btn {
  width: 36px; height: 34px; border-radius: 9px; border: 1.5px solid var(--border);
  background: transparent; color: var(--t2); font-size: 17px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  transition: all 0.15s;
}
.done-btn.done { background: var(--accent-dark); border-color: var(--accent-dark); color: #fff; }

.set-actions { display: flex; gap: 8px; margin-top: 10px; padding-top: 8px; border-top: 1px solid var(--border); }
.set-action-btn {
  flex: 1; padding: 8px; border-radius: 9px; font-size: 11px; font-weight: 700;
  cursor: pointer; text-align: center; border: 1px solid var(--border);
  background: var(--input-bg); color: var(--t2); transition: all 0.15s;
}
.set-action-btn.add { color: #fff; border-color: var(--accent-dark); background: var(--accent-dark); }
.set-action-btn.rem { color: #fff; border-color: var(--accent-dark); background: var(--accent-dark); }

/* ── Add Exercise Panel ── */
.add-ex-panel {
  background: var(--s1); border-radius: 13px; border: 1px dashed var(--border);
  padding: 14px; margin-bottom: 9px;
}
.add-ex-title { font-size: 11px; font-weight: 700; color: var(--t2); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; }
.add-ex-input {
  width: 100%; padding: 10px 12px; border-radius: 10px;
  border: 1.5px solid var(--border); background: var(--input-bg);
  font-size: 13px; color: var(--text); outline: none; margin-bottom: 8px;
}
.add-ex-input:focus { border-color: var(--accent-dark); }
.add-ex-row { display: flex; gap: 8px; margin-bottom: 8px; }
.add-ex-row .add-ex-input { margin-bottom: 0; }
.add-ex-save {
  width: 100%; padding: 10px; background: var(--accent-dark); color: #fff;
  border: none; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer;
}

/* ── Complete Routine Banner ── */
.finish-banner {
  background: var(--accent-dark); border: 1px solid var(--accent-dark);
  border-radius: 11px; padding: 16px; text-align: center; color: #fff;
  font-weight: 600; font-size: 14px; margin: 12px 0;
}
.complete-routine-wrap { margin: 10px 0 8px; display: flex; gap: 8px; }
.complete-routine-btn {
  flex: 1; padding: 13px 8px; border-radius: 12px; font-size: 13px; font-weight: 700;
  cursor: pointer; border: 1.5px solid var(--accent-dark); background: var(--accent-dark);
  color: #fff; transition: opacity 0.15s;
}
.complete-routine-btn:disabled { opacity: 0.45; cursor: not-allowed; pointer-events: none; }
.complete-routine-btn:not(:disabled):active { opacity: 0.8; }
.reset-day-btn {
  flex: 1; padding: 13px 8px; border-radius: 12px; font-size: 13px; font-weight: 700;
  cursor: pointer; border: 1.5px solid var(--accent-dark); background: var(--accent-dark);
  color: #fff; transition: all 0.15s;
}
.reset-day-btn:active { background: var(--accent-dark); opacity: 0.8; }
.reset-weeks-wrap { margin: 0 0 16px; }
.reset-weeks-btn {
  width: 100%; padding: 13px; border-radius: 12px; font-size: 12px; font-weight: 700;
  cursor: pointer; border: 1.5px solid var(--border); background: transparent;
  color: var(--t2); transition: all 0.15s; letter-spacing: 0.3px;
}
.reset-weeks-btn:active { border-color: var(--accent-dark); color: #fff; background: var(--accent-dark); }

/* ── History ── */
.hist-card {
  background: var(--s1); border-radius: 13px; padding: 14px 16px; margin-bottom: 9px;
  border: 1px solid var(--border); display: flex; justify-content: space-between;
  align-items: center; cursor: pointer; box-shadow: var(--shadow);
}
.hist-card:active { border-color: var(--accent-dark); }
.hist-title { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
.hist-sub { font-size: 11px; color: var(--t2); margin-bottom: 4px; }
.hist-date { font-size: 10px; color: var(--t2); font-family: 'Geist Mono', monospace; }
.hist-pct { font-size: 28px; font-weight: 800; font-family: 'Geist Mono', monospace; color: var(--accent-dark); }
.hist-pct-lbl { font-size: 9px; color: var(--t2); text-align: right; font-family: 'Geist Mono', monospace; }
.hist-done-tag { font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 20px; background: var(--accent-dark); color: #fff; margin-top: 4px; display: inline-block; }

/* ── Heatmap ── */
.heatmap-card {
  background: var(--s1);
  border-radius: 14px;
  border: 1px solid var(--border);
  padding: 20px 24px;
  margin: 12px 4px 16px;
  box-shadow: var(--shadow);
}
.hm-stats {
  display: flex;
  gap: 1px;
  background: var(--border);
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 16px;
}
.hm-stat {
  flex: 1;
  background: var(--s1);
  padding: 10px 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}
.hm-stat:first-child { border-radius: 10px 0 0 10px; }
.hm-stat:last-child { border-radius: 0 10px 10px 0; }
.hm-stat-value {
  font-size: 18px;
  font-weight: 800;
  color: var(--accent);
  font-variant-numeric: tabular-nums;
  font-family: 'Geist Mono', monospace;
  line-height: 1;
}
.hm-stat-label {
  font-size: 9px;
  font-weight: 600;
  color: var(--t2);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.hm-year-nav {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin-bottom: 16px;
}
.hm-year-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.01em;
}
.hm-nav-btn {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--s2);
  color: var(--text);
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s, opacity 0.15s;
  line-height: 1;
  padding: 0;
}
.hm-nav-btn:hover { background: var(--border); }
.hm-nav-btn:active { opacity: 0.7; }
.hm-nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.hm-year-section {
  margin-top: 8px;
}
.hm-year-grid {
  display: flex;
  gap: 5px;
  overflow-x: auto;
  padding-bottom: 4px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.hm-year-grid::-webkit-scrollbar { height: 3px; }
.hm-year-grid::-webkit-scrollbar-track { background: transparent; }
.hm-year-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.hm-year-month {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  min-width: 0;
  flex-shrink: 0;
}
.hm-year-month-label {
  font-size: 8px;
  color: var(--t2);
  font-weight: 600;
  font-family: 'Geist Mono', monospace;
}
.hm-year-month-grid {
  display: grid;
  grid-template-columns: repeat(7, 7px);
  gap: 1.5px;
}
.hm-year-cell {
  width: 7px;

.ex-sheet-sub-btn { background: var(--s2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 14px; font-size: 12px; font-weight: 600; color: var(--text); cursor: pointer; transition: all 0.15s; min-height: 36px; margin-top: 12px; }

/* ── Bottom Nav Icons ── */

}

/* ── Settings Panel ── */
.settings-panel { padding: 0 4px; }

/* Theme toggle cards */

}
.theme-card {
  flex: 1; border-radius: 13px; border: 2px solid var(--border);

.theme-label { font-size: 12px; font-weight: 600; color: var(--text); }
.theme-check {
  position: absolute; top: 8px; right: 8px;
  width: 20px; height: 20px; border-radius: 50%;
  background: var(--accent-dark); color: #fff; font-size: 11px;
  display: none; align-items: center; justify-content: center;
}

/* Accent color grid */
.accent-grid {
  display: grid; grid-template-columns: repeat(5, 1fr);
  gap: 10px; margin-bottom: 20px;
}
.accent-swatch {
  aspect-ratio: 1; border-radius: 50%; border: 3px solid transparent;
  cursor: pointer; position: relative; min-width: 44px; min-height: 44px;
  transition: border-color 0.15s, transform 0.1s;
}
.accent-swatch:active { transform: scale(0.92); }
.accent-swatch.on { border-color: var(--text); }
.accent-check {
  position: absolute; inset: 0; display: none;
  align-items: center; justify-content: center;
  color: #fff; font-size: 16px; font-weight: 800;
  text-shadow: 0 1px 2px rgba(0,0,0,0.3);
}
.accent-swatch.on .accent-check { display: flex; }

/* Settings footer */
.settings-footer {
  text-align: center; padding: 24px 0; font-size: 11px; color: var(--t2);
}
</style>
</head>

<script>
const API = '';  // same origin

// ── State ─────────────────────────────────────────────────────────────────────

// ── Theme & Accent System ─────────────────────────────────────────────────────
const DEFAULT_THEME = 'light';
const DEFAULT_ACCENT = '#E8944A';

// ⚠️ KEEP IN SYNC with accent presets in <head> script
const ACCENT_PRESETS = {
  '#E8944A': { label: 'Orange',  base: '#E8944A', dark: '#C46D22', soft: 'rgba(232,148,74,0.15)' },

// ── API helpers ───────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const r = await fetch(API + path, opts);
  if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.error || r.statusText); }
  return r.json();
}

// ── Auth ──────────────────────────────────────────────────────────────────────
async function doLogin() {
  const name = document.getElementById('login-username').value.trim();
  if (!name) { document.getElementById('login-error').textContent = 'Please enter a username'; return; }
  try {
    const u = await api('POST', '/api/auth/login', { username: name });
    user = u;
    localStorage.setItem('lift-user', JSON.stringify(u));
    await initApp();
  } catch (e) {
    document.getElementById('login-error').textContent = e.message;
  }
}

document.getElementById('login-username').addEventListener('keydown', e => {

});

function showUserMenu() {

    { label: `Signed in as ${user.username}`, disabled: true },
    { label: 'Log out', cls: 'destructive', action: doLogout }

}

function doLogout() {
  localStorage.removeItem('lift-user');
  user = null; routine = null; sessions = {};
  libraryCache = null; substitutions = {}; subPickerExId = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';

// ── Init ──────────────────────────────────────────────────────────────────────
async function initApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';

  document.getElementById('userChipName').textContent = user.username;
  document.getElementById('userAvatar').textContent = user.username[0].toUpperCase();

  routine = await api('GET', `/api/users/${user.id}/routine`);
  D = routine.days[0]?.id || null;
  const allLoads = [];
  for (let w = 1; w <= 4; w++) routine.days.forEach(d => allLoads.push(loadSess(w, d.id)));
  await Promise.all(allLoads);
  renderHeader();
  rc();
}

// ── Session loading ───────────────────────────────────────────────────────────
async function loadSess(w, dayId) {
  if (!dayId) return;
  const key = `${dayId}:${w}`;
  if (!sessions[key]) {
    const data = await api('GET', `/api/users/${user.id}/session?dayId=${dayId}&week=${w}`);
    sessions[key] = data;
  }
  return sessions[key];
}

function getSess(w, dayId) { return sessions[`${dayId}:${w}`] || null; }

function getLog(sessionId, exerciseId, si) {
  const s = Object.values(sessions).find(s => s?.session?.id === sessionId);
  if (!s) return null;
  return s.logs.find(l => l.exercise_id === exerciseId && l.set_index === si) || null;
}

async function ensureSess(w, dayId) {
  const key = `${dayId}:${w}`;
  if (!sessions[key]) await loadSess(w, dayId);
  return sessions[key];
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function getDay(dayId) { return routine?.days.find(d => d.id === dayId); }
function getAllExercises() {
  const all = [];
  if (!routine) return all;
  for (const day of routine.days)
    for (const sec of day.sections)
      for (const ex of sec.exercises)
        all.push({ ...ex, dayId: day.id, dayKey: day.day_key, dayLabel: day.day_label });
  return all;
}

function countSetsForDay(dayId) {
  const day = getDay(dayId); if (!day) return 0;
  return day.sections.reduce((a, s) => a + s.exercises.reduce((b, e) => b + e.sets, 0), 0);
}

function countDoneSets(w, dayId) {
  const s = getSess(w, dayId); if (!s) return 0;
  return s.logs.filter(l => l.done).length;
}

// ── Header ────────────────────────────────────────────────────────────────────
function renderHeader() {
  if (!routine) return;
  
  const isWorkoutTab = tab === 'workout';
  const weekTabsEl = document.getElementById('weekTabs');
  const dayTabsEl = document.getElementById('dayTabs');
  const focusTxtEl = document.getElementById('focusTxt');
  const rirTxtEl = document.getElementById('rirTxt');
  const pctBigEl = document.getElementById('pctBig');
  const setsTxtEl = document.getElementById('setsTxt');
  const progTrackEl = document.querySelector('.prog-track');

  if (isWorkoutTab) {
    weekTabsEl.style.display = '';
    dayTabsEl.style.display = '';
    focusTxtEl.parentElement.parentElement.style.display = '';
    pctBigEl.parentElement.parentElement.style.display = '';
    progTrackEl.style.display = '';

    const doneCountForWeek = (w) => routine.days.filter(d => getSess(w, d.id)?.session?.completed).length;
    const totalDays = routine.days.length;
    let badgeWeek = null;
    for (let w = 1; w <= 4; w++) {
      if (doneCountForWeek(w) < totalDays) { badgeWeek = w; break; }
    }

    weekTabsEl.innerHTML = [1, 2, 3, 4].map(w => {
      const doneCount = doneCountForWeek(w);
      const allDone = doneCount === totalDays;
      return `<button class="week-tab${w === W ? ' on' : ''}${allDone ? ' done-wk' : ''}${badgeWeek === w ? ' has-dot' : ''}" onclick="setW(${w})">W${w}</button>`;
    }).join('');

    dayTabsEl.innerHTML = routine.days.map(d => {
      const s = getSess(W, d.id);
      const done = s?.session?.completed;
      return `<div class="day-tab-wrap">
        <button class="day-tab${d.id === D ? ' on' : ''}${done ? ' done' : ''}"
          onmousedown="startDayPress('${d.id}')" onmouseup="cancelDayPress()" onmouseleave="cancelDayPress()"
          ontouchstart="startDayPress('${d.id}')" ontouchend="cancelDayPress()" ontouchmove="cancelDayPress()"
          onclick="tapDay('${d.id}')">
          <div class="dl">${d.day_label}</div>
          <div class="ds">${d.day_name}</div>
        </button>
        ${d.id === D ? `<button class="day-del-btn" onclick="confirmDelDay('${d.id}')">×</button>` : ''}
      </div>`;
    }).join('') + `<button class="add-day-btn" onclick="openAddDay()" title="Add day">+</button>`;

    const day = getDay(D);
    if (day) {
      focusTxtEl.textContent = day.focus;
      const r = RIR[W] || {};
      rirTxtEl.textContent = `${r.label || ''} · ${r.desc || ''}`;
    }
    updStats();
  } else {
    weekTabsEl.style.display = 'none';
    dayTabsEl.style.display = 'none';
    focusTxtEl.parentElement.parentElement.style.display = 'none';
    pctBigEl.parentElement.parentElement.style.display = 'none';
    progTrackEl.style.display = 'none';
  }
}

function updStats() {
  const tot = countSetsForDay(D);
  const done = countDoneSets(W, D);
  const pct = tot > 0 ? Math.round(done / tot * 100) : 0;
  document.getElementById('pctBig').textContent = pct + '%';
  document.getElementById('setsTxt').textContent = `${done} / ${tot} sets`;
  document.getElementById('progFill').style.width = pct + '%';
}

// ── Workout tab ───────────────────────────────────────────────────────────────
async function renderWorkout() {
  const day = getDay(D); if (!day) { document.getElementById('content').innerHTML = ''; return; }
  const s = await ensureSess(W, D);
  const session = s?.session;
  const logs = s?.logs || [];

  // Load previous week data so PREV column has values
  if (W === 1) {
    // On W1, load previous cycle from archived sessions
    if (!sessions[`${D}:prev-cycle`]) {
      try {
        const hist = await api('GET', `/api/users/${user.id}/history`);
        const prev = hist.find(s => s.day_id === D && s.archived === 1);
        sessions[`${D}:prev-cycle`] = prev || null;
      } catch (e) { sessions[`${D}:prev-cycle`] = null; }
    }
  } else {
    const prevWNum = W - 1;
    if (!sessions[`${D}:${prevWNum}`]) await loadSess(prevWNum, D);

  const isCompleted = session?.completed;

  let h = '';

        <div style="display:flex;gap:8px">

        <div class="add-ex-row">
          <input id="newExSets" class="add-ex-input" type="number" inputmode="numeric" placeholder="Sets (e.g. 3)" />
          <input id="newExReps" class="add-ex-input" type="text" placeholder="Reps (e.g. 8-10)" />
        </div>

    for (const ex of section.exercises) {

      h += `<div class="ex-card-wrap" id="ex-wrap-${ex.id}">

function tog(exId) { open[exId] = open[exId] === false ? true : false; rc(); }

let swipeState = {};
function handleSwipeStart(e, exId) {
  swipeState[exId] = { startX: e.touches[0].clientX, startY: e.touches[0].clientY, moved: false };
}
function handleSwipeMove(e, exId) {
  const s = swipeState[exId];
  if (!s) return;
  const dx = e.touches[0].clientX - s.startX;
  const dy = e.touches[0].clientY - s.startY;
  if (Math.abs(dx) > 10 && Math.abs(dx) > Math.abs(dy)) s.moved = true;
}
function handleSwipeEnd(e, exId) {
  const s = swipeState[exId];
  if (!s || !s.moved) { swipeState[exId] = null; return; }
  const dx = e.changedTouches[0].clientX - s.startX;
  const wrap = document.getElementById(`ex-wrap-${exId}`);
  if (wrap) {
    if (dx < -60) wrap.classList.add('swiped');
    else wrap.classList.remove('swiped');
  }
  swipeState[exId] = null;
}
document.addEventListener('click', e => {
  if (!e.target.closest('.ex-card-wrap')) {
    document.querySelectorAll('.ex-card-wrap.swiped').forEach(el => el.classList.remove('swiped'));
  }
});

// ── Exercise Substitution ──────────────────────────────────────────────────────

function getSubstitution(exerciseId) {
  // First check set_logs for active substitution
  const s = getSess(W, D);
  if (s) {
    const log = s.logs.find(l => l.exercise_id === exerciseId && l.substituted_exercise_name);
    if (log) return { name: log.substituted_exercise_name, libraryId: log.substituted_library_id };
  }
  // Fallback: check pending substitutions (set before any logs exist)
  return substitutions[exerciseId] || null;
}

async function openSubstitutePicker(exId) {
  subPickerExId = exId;
  hideAddExInput();

  try {
    if (!libraryCache) libraryCache = await api('GET', `/api/users/${user.id}/library`);
  } catch (e) { libraryCache = []; }

  let history = [];
  try {
    history = await api('GET', `/api/users/${user.id}/exercises/${exId}/substitution-history`);
  } catch (e) { history = []; }

  const libNames = new Set(libraryCache.map(l => l.name.toLowerCase()));
  const extraHistory = history.filter(h => !libNames.has(h.name.toLowerCase()) && h.libraryId);

  const list = document.getElementById('subPickerList');
  let h = '';

  for (const lib of libraryCache) {
    const safe = lib.name.replace(/'/g, "\\'").replace(/"/g, "&quot;");
    h += `<button class="sub-picker-item" onclick="applySubstitution('${exId}','${lib.id}','${safe}')">${lib.name}</button>`;
  }

  for (const hist of extraHistory) {
    const safe = hist.name.replace(/'/g, "\\'").replace(/"/g, "&quot;");
    h += `<button class="sub-picker-item sub-picker-history" onclick="applySubstitution('${exId}','${hist.libraryId}','${safe}')">${hist.name} <span class="sub-picker-history-tag">previous</span></button>`;
  }

  if (!h) {
    h = '<div class="sub-picker-empty">No exercises available.<br>Type one below or add to your library.</div>';
  }

  list.innerHTML = h;
  document.getElementById('subPickerOverlay').classList.add('open');
}

function closeSubPicker(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById('subPickerOverlay').classList.remove('open');
  hideAddExInput();
}

function showAddExInput() {
  document.getElementById('subPickerAddBtn').style.display = 'none';
  document.getElementById('subPickerAddInput').style.display = 'flex';
  document.getElementById('subPickerNewExName').focus();
}

function hideAddExInput() {
  const btn = document.getElementById('subPickerAddBtn');
  const input = document.getElementById('subPickerAddInput');
  if (btn) btn.style.display = '';
  if (input) input.style.display = 'none';
  const field = document.getElementById('subPickerNewExName');
  if (field) field.value = '';
}

async function saveNewLibraryEx() {
  const input = document.getElementById('subPickerNewExName');
  const name = input.value.trim();
  if (!name) return;

  const exId = subPickerExId;
  try {
    const ex = await api('POST', `/api/users/${user.id}/library`, { name });
    libraryCache.push(ex);
    if (exId) {
      await applySubstitution(exId, ex.id, ex.name);
    }
  } catch (e) { console.error(e); }
}

async function applySubstitution(exId, libId, libName) {
  try {
    const s = getSess(W, D);
    if (!s) return;
    await api('PUT', `/api/sessions/${s.session.id}/exercises/${exId}/substitute`, {
      libraryExerciseId: libId,
      libraryExerciseName: libName
    });
    // Track pending substitution (for when no set_logs exist yet)
    substitutions[exId] = { name: libName, libraryId: libId };
    // Refresh session cache
    const freshSess = await api('GET', `/api/users/${user.id}/session?dayId=${D}&week=${W}`);
    const key = `${D}:${W}`;
    sessions[key] = freshSess;
    closeSubPicker();
    // Re-render exercise sheet if open
    if (currentExSheet && currentExSheet.exId === exId) {
      openExSheet(exId);
    }
    rc();
  } catch (e) { console.error(e); }
}

async function revertSubstitution(exId) {
  try {
    const s = getSess(W, D);
    if (!s) return;
    await api('PUT', `/api/sessions/${s.session.id}/exercises/${exId}/substitute`, {
      libraryExerciseId: null,
      libraryExerciseName: null
    });
    // Clear pending substitution
    delete substitutions[exId];
    const freshSess = await api('GET', `/api/users/${user.id}/session?dayId=${D}&week=${W}`);
    const key = `${D}:${W}`;
    sessions[key] = freshSess;
    // Re-render exercise sheet if open
    if (currentExSheet && currentExSheet.exId === exId) {
      openExSheet(exId);
    }
    rc();
  } catch (e) { console.error(e); }
}

// ── Exercise Sheet ─────────────────────────────────────────────────────────────
let currentExSheet = null;

async function openExSheet(exId) {
  const ex = getAllExercises().find(e => e.id === exId);
  if (!ex) return;
  const s = getSess(W, D);
  if (!s) return;
  const logs = s.logs.filter(l => l.exercise_id === exId);
  const firstLog = logs.find(l => l.set_index === 0) || {};

  let prevSessData;
  if (W === 1) {
    prevSessData = sessions[`${D}:prev-cycle`];
    if (prevSessData === undefined) {
      try {
        const hist = await api('GET', `/api/users/${user.id}/history`);
        prevSessData = hist.find(s => s.day_id === D && s.archived === 1) || null;
        sessions[`${D}:prev-cycle`] = prevSessData;
      } catch (e) { prevSessData = null; }
    }
  } else {
    const prevWNum = W - 1;
    if (!sessions[`${D}:${prevWNum}`]) await loadSess(prevWNum, D);
    prevSessData = sessions[`${D}:${prevWNum}`];
  }
  const sub = getSubstitution(exId);
  document.getElementById('exSheetTitle').textContent = sub ? sub.name : ex.name;
  document.getElementById('exSheetMeta').textContent = sub
    ? `${ex.sets} sets · ${ex.reps} reps — from ${ex.name}`
    : `${ex.sets} sets · ${ex.reps} reps`;

  const prevWrap = document.getElementById('exSheetPrev');
  let prevLog = null;
  if (sub) {
    // Substitute active — look for previous week's data by exercise name
    const prevLogs = prevSessData?.logs?.filter(l => l.exercise_id === exId) || [];
    prevLog = prevLogs.find(l => {
      if (l.set_index !== 0) return false;
      // Match if previous week had same substitute name
      if (l.substituted_exercise_name === sub.name) return true;
      // Fallback: previous week had no substitution and template name matches substitute
      // (handles case where substitute name equals template exercise name)
      if (!l.substituted_exercise_name && ex.name === sub.name) return true;
      return false;
    });
    // If no match found, try to show template exercise data from previous week as fallback
    // This handles first-time substitution where previous week used the original exercise
    if (!prevLog) {
      prevLog = prevLogs.find(l => l.set_index === 0 && !l.substituted_exercise_name);
    }
  } else {
    prevLog = prevSessData?.logs?.find(l => l.exercise_id === exId && l.set_index === 0);
  }
  if (prevLog && (prevLog.weight_lbs || prevLog.reps)) {
    prevWrap.style.display = 'block';
    document.getElementById('exSheetPrevData').innerHTML = `
      <span>Weight: ${prevLog.weight_lbs || '—'} lbs</span>
      <span>Reps: ${prevLog.reps || '—'}</span>
    `;
  } else {
    prevWrap.style.display = 'none';
  }

  // Substitute/Revert button
  const subBtnHtml = sub
    ? `<button class="ex-sheet-sub-btn revert" onclick="revertSubstitution('${exId}')">↩ Revert to ${ex.name}</button>`
    : `<button class="ex-sheet-sub-btn" onclick="openSubstitutePicker('${exId}')">⇄ Substitute Exercise</button>`;

  const allSetsDone = logs.filter(l => l.done).length >= ex.sets && ex.sets > 0;
  let h = `<div class="sets-wrap" style="border:none;padding:0">
    <div class="set-heads">
      <span style="width:28px;text-align:center">SET</span>
      <span style="flex:1;text-align:center">PREV</span>
      <span style="flex:1;text-align:center">LBS</span>
      <span style="flex:1;text-align:center">REPS</span>
      <span style="width:36px;text-align:center">✓</span>
    </div>
    <div class="set-row${allSetsDone ? ' done-row' : ''}">
      <input class="set-input${allSetsDone ? ' done-inp' : ''}" style="flex:none;width:28px;font-size:11px;padding:8px 2px" type="number" inputmode="numeric"
        value="${ex.sets}" onchange="updExSets('${ex.id}',this.value);openExSheet('${ex.id}');"/>
      <input class="set-input${allSetsDone ? ' done-inp' : ''}" style="flex:1;font-size:12px" type="number" inputmode="numeric"
        readonly tabindex="-1" placeholder="—" value="${prevLog?.weight_lbs ?? ''}"/>

async function updSet(sessionId, exerciseId, setIndex, fields) {
  try {
    const log = await api('PUT', `/api/sessions/${sessionId}/sets`, { exerciseId, setIndex, ...fields });
    // Update local cache
    const key = Object.keys(sessions).find(k => sessions[k]?.session?.id === sessionId);
    if (key) {
      const idx = sessions[key].logs.findIndex(l => l.exercise_id === exerciseId && l.set_index === setIndex);
      if (idx >= 0) sessions[key].logs[idx] = log;
      else sessions[key].logs.push(log);
      // Refresh session completion state
      const freshSess = await api('GET', `/api/users/${user.id}/session?dayId=${D}&week=${W}`);
      sessions[key] = freshSess;
    }
  } catch (e) { console.error(e); }
  updStats();
}

// ── Mark Routine Complete (one-way — use Reset This Day to undo) ──────────────
async function markComplete() {
  const s = getSess(W, D); if (!s || s.session.completed) return;
  const sessionId = s.session.id;
  const day = getDay(D); if (!day) return;
  const allExercises = day.sections.flatMap(sec => sec.exercises);
  for (const ex of allExercises) {
    // Find existing substitution data to carry forward
    const existingLogs = s.logs.filter(l => l.exercise_id === ex.id);
    const subLog = existingLogs.find(l => l.substituted_exercise_name);
    const subFields = subLog ? {
      substitutedExerciseName: subLog.substituted_exercise_name,
      substitutedLibraryId: subLog.substituted_library_id
    } : (substitutions[ex.id] ? {
      substitutedExerciseName: substitutions[ex.id].name,
      substitutedLibraryId: substitutions[ex.id].libraryId
    } : {});

    for (let si = 0; si < ex.sets; si++)
      await api('PUT', `/api/sessions/${sessionId}/sets`, { exerciseId: ex.id, setIndex: si, done: true, ...subFields });
  }
  await api('POST', `/api/sessions/${sessionId}/complete`);
  const freshSess = await api('GET', `/api/users/${user.id}/session?dayId=${D}&week=${W}`);
  sessions[`${D}:${W}`] = freshSess;
  renderHeader();
  rc();
}

// ── Reset This Day (clears done flags + session completion; keeps weights/reps) ─
async function resetDay() {
  const s = getSess(W, D); if (!s) return;
  const sessionId = s.session.id;
  const day = getDay(D); if (!day) return;
  const allExercises = day.sections.flatMap(sec => sec.exercises);
  for (const ex of allExercises)
    for (let si = 0; si < ex.sets; si++)
      await api('PUT', `/api/sessions/${sessionId}/sets`, { exerciseId: ex.id, setIndex: si, done: false });
  await api('POST', `/api/sessions/${sessionId}/reset`);
  const freshSess = await api('GET', `/api/users/${user.id}/session?dayId=${D}&week=${W}`);
  sessions[`${D}:${W}`] = freshSess;
  renderHeader();
  rc();
}

async function updExSets(exerciseId, newSets) {

  try {

async function toggleExDone(sessionId, exerciseId, setsCount, done) {
  try {
    // Find existing substitution data to carry forward to new set_logs
    const s = getSess(W, D);
    const existingLogs = s?.logs?.filter(l => l.exercise_id === exerciseId) || [];
    const subLog = existingLogs.find(l => l.substituted_exercise_name);
    const subFields = subLog ? {
      substitutedExerciseName: subLog.substituted_exercise_name,
      substitutedLibraryId: subLog.substituted_library_id
    } : (substitutions[exerciseId] ? {
      substitutedExerciseName: substitutions[exerciseId].name,
      substitutedLibraryId: substitutions[exerciseId].libraryId
    } : {});

    for (let si = 0; si < setsCount; si++) {
      await api('PUT', `/api/sessions/${sessionId}/sets`, { exerciseId, setIndex: si, done, ...subFields });
    }
    const key = Object.keys(sessions).find(k => sessions[k]?.session?.id === sessionId);
    if (key) {
      const freshSess = await api('GET', `/api/users/${user.id}/session?dayId=${D}&week=${W}`);
      sessions[key] = freshSess;
    }
    updStats();
    renderHeader();
    rc();
  } catch (e) { console.error(e); }
}

// Fix: async handler that saves typed LBS/REPS values BEFORE toggling done,
// then awaits toggleExDone, then re-renders — preventing the race condition
// where openExSheet was called synchronously before toggleExDone completed.
async function handleExDone(sessionId, exerciseId, setsCount, done) {
  // Capture current typed values from the sheet inputs before any async work
  const lbsInput  = document.querySelector('#exSheetSets .lbs-input');
  const repsInput = document.querySelector('#exSheetSets .reps-input');

  // Persist whatever the user typed (these may not have fired onchange yet)
  if (lbsInput  && lbsInput.value  !== '')
    await updSet(sessionId, exerciseId, 0, { weightLbs: lbsInput.value });
  if (repsInput && repsInput.value !== '')
    await updSet(sessionId, exerciseId, 0, { reps: repsInput.value });

  await toggleExDone(sessionId, exerciseId, setsCount, done);
  await openExSheet(exerciseId);   // re-render AFTER everything is saved
}

async function addSet(exerciseId) {
  try {
    const ex = await api('PATCH', `/api/exercises/${exerciseId}`, { sets: getExercise(exerciseId).sets + 1 });
    updateExInRoutine(ex);
    rc();
  } catch (e) { console.error(e); }
}

async function removeSet(exerciseId) {
  const ex = getExercise(exerciseId);
  if (ex.sets <= 1) return;
  try {
    const updated = await api('PATCH', `/api/exercises/${exerciseId}`, { sets: ex.sets - 1 });
    updateExInRoutine(updated);
    rc();
  } catch (e) { console.error(e); }
}

function getExercise(exerciseId) {
  for (const d of routine.days)
    for (const s of d.sections)
      for (const e of s.exercises)
        if (e.id === exerciseId) return e;
  return null;
}

function updateExInRoutine(ex) {
  for (const d of routine.days)
    for (const s of d.sections) {
      const idx = s.exercises.findIndex(e => e.id === ex.id);
      if (idx >= 0) { s.exercises[idx] = ex; return; }
    }
}

const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
let selectedYear = new Date().getFullYear();

function heatmapPrevYear() {
  selectedYear--;
  renderHistory();
}

function heatmapNextYear() {
  const thisYear = new Date().getFullYear();
  if (selectedYear < thisYear) {
    selectedYear++;
    renderHistory();
  }
}

function buildYearOverviewGrid(yearGrid) {
  let html = '';
  for (const month of yearGrid) {
    let cellsHtml = '';
    for (let i = 0; i < month.cells.length; i++) {
      const filled = month.cells[i] === 1;
      const colStart = i === 0 ? ` style="grid-column-start:${month.startDow + 1}"` : '';
      cellsHtml += `<div class="hm-year-cell${filled ? ' filled' : ''}"${colStart} aria-hidden="true"></div>`;
    }
    html += `<div class="hm-year-month">
      <div class="hm-year-month-label">${MONTH_NAMES[month.month - 1]}</div>
      <div class="hm-year-month-grid">${cellsHtml}</div>
    </div>`;
  }
  return html;
}

async function renderHistory() {
  const content = document.getElementById('content');
  const currentMonth = new Date().getMonth(); // 0-indexed
  const thisYear = new Date().getFullYear();
  const atMaxYear = selectedYear >= thisYear;

  // Show loading state
  content.innerHTML = `
    <div class="heatmap-card">
      <div class="hm-year-nav">
        <button class="hm-nav-btn" onclick="heatmapPrevYear()" aria-label="Previous year">&lsaquo;</button>
        <span class="hm-year-title">${selectedYear} Overview</span>
        <button class="hm-nav-btn" onclick="heatmapNextYear()" aria-label="Next year" ${atMaxYear ? 'disabled' : ''}>&rsaquo;</button>
      </div>
      <div class="hm-stats">
        <div class="hm-stat"><span class="hm-stat-value" style="opacity:0.3">—</span><span class="hm-stat-label">Month Total</span></div>
        <div class="hm-stat"><span class="hm-stat-value" style="opacity:0.3">—</span><span class="hm-stat-label">Year Total</span></div>
      </div>
      <div style="height:60px;background:var(--s2);border-radius:8px;margin-top:4px"></div>
      <div class="hm-year-section"><div class="hm-year-grid" style="min-height:60px"></div></div>
    </div>
    <div class="section-lbl"><span>Past Sessions</span></div>
  `;

  // Fetch heatmap data and history in parallel
  const [heatmap, history] = await Promise.all([
    api('GET', `/api/users/${user.id}/heatmap/${selectedYear}`),
    api('GET', `/api/users/${user.id}/history`)
  ]);

  const completedHistory = history.filter(s => s.completed);
  const monthTotal = heatmap.monthTotals[currentMonth] || 0;

  // Build year overview grid
  const yearOverviewHtml = buildYearOverviewGrid(heatmap.yearGrid);

  // Build history cards (no focus text per FR-5)
  let cardsHtml = '';
  for (const s of completedHistory) {
    const day = routine.days.find(d => d.id === s.day_id);
    if (!day) continue;
    const tot = countSetsForDay(day.id);
    const dn = s.logs.filter(l => l.done).length;
    const pct = tot > 0 ? Math.round(dn / tot * 100) : 0;
    const rawDate = s.completed_at || s.created_at;
    const normDate = rawDate ? rawDate.replace(' ', 'T').replace(/(\d{2}:\d{2}:\d{2})$/, '$1Z') : null;
    const dt = normDate
      ? new Date(normDate).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })
      : '\u2014';
    cardsHtml += `<div class="hist-card" onclick="goSess('${day.id}', ${s.week_num})">
      <div>
        <div class="hist-title">Week ${s.week_num} · ${s.day_label}</div>
        <div class="hist-date">${dt}</div>
        ${s.completed ? '<span class="hist-done-tag">✓ Completed</span>' : ''}
      </div>
      <div style="text-align:right">
        <div class="hist-pct">${pct}%</div>
        <div class="hist-pct-lbl">${dn}/${tot} sets</div>
      </div>
    </div>`;
  }

  // Assemble full history view
  content.innerHTML = `
    <div class="heatmap-card" role="region" aria-label="Workout activity heatmap">
      <div class="hm-year-nav">
        <button class="hm-nav-btn" onclick="heatmapPrevYear()" aria-label="Previous year">&lsaquo;</button>
        <span class="hm-year-title">${selectedYear} Overview</span>
        <button class="hm-nav-btn" onclick="heatmapNextYear()" aria-label="Next year" ${atMaxYear ? 'disabled' : ''}>&rsaquo;</button>
      </div>
      <div class="hm-stats" role="group" aria-label="Workout statistics">
        <div class="hm-stat">
          <span class="hm-stat-value">${monthTotal}</span>
          <span class="hm-stat-label">Month Total</span>
        </div>
        <div class="hm-stat">
          <span class="hm-stat-value">${heatmap.yearTotal}</span>
          <span class="hm-stat-label">Year Total</span>
        </div>
      </div>
      <div class="hm-year-section">
        <div class="hm-year-grid" role="grid" aria-label="Yearly activity overview">
          ${yearOverviewHtml}
        </div>
      </div>
    </div>
    <div class="section-lbl"><span>Past Sessions</span></div>
    ${cardsHtml || '<div class="empty">No completed sessions yet.<br/>Complete a workout to see history.</div>'}
  `;

  if (selectedYear === thisYear) {
    requestAnimationFrame(() => {
      const grid = document.querySelector('.hm-year-grid');
      const months = grid?.querySelectorAll('.hm-year-month');
      if (months && months[currentMonth]) {
        const monthEl = months[currentMonth];
        const scrollTarget = monthEl.offsetLeft - (grid.clientWidth / 2) + (monthEl.offsetWidth / 2);
        const maxScroll = grid.scrollWidth - grid.clientWidth;
        grid.scrollTo({ left: Math.min(Math.max(0, scrollTarget), maxScroll), behavior: 'smooth' });
      }
    });
  }
}

// ── Progress tab ──────────────────────────────────────────────────────────────
async function renderProgress() {
  const allEx = getAllExercises();

  // Fetch library exercises (with caching)
  let libExs = [];
  try {
    if (!libraryCache) libraryCache = await api('GET', `/api/users/${user.id}/library`);
    libExs = libraryCache || [];
  } catch (e) { libExs = []; }

  // Deduplicate: template exercises by name, then add library-only exercises
  const templateNames = new Set(allEx.map(e => e.name.toLowerCase()));
  const libOnly = libExs.filter(le => !templateNames.has(le.name.toLowerCase()));

  // Group template exercises by day
  const byDay = new Map();
  for (const e of allEx) {
    if (!byDay.has(e.dayLabel)) byDay.set(e.dayLabel, []);
    byDay.get(e.dayLabel).push(e);
  }

  let h = '';
  for (const [dayLabel, dayExs] of byDay) {
    if (!dayExs.length) continue;
    h += `<div class="section-lbl"><span>${dayLabel}</span></div>
      <div class="ex-picker-wrap">${dayExs.map(e =>
        `<button class="ex-pick${selEx === 't:' + e.id ? ' on' : ''}" onclick="lprog('t:${e.id}')">${e.name}</button>`
      ).join('')}</div>`;
  }

  if (libOnly.length) {
    h += `<div class="section-lbl"><span>Substitute Exercises</span></div>
      <div class="ex-picker-wrap">${libOnly.map(le =>
        `<button class="ex-pick sub${selEx === 'n:' + le.name ? ' on' : ''}" onclick="lprog('n:${le.name.replace(/'/g, "\\'")}')">${le.name}</button>`
      ).join('')}</div>`;
  }

  h += `<div class="empty" style="padding:24px;font-size:12px">Select an exercise above<br/>to see weight progression.</div>`;
  document.getElementById('content').innerHTML = h;
}

async function lprog(id) { selEx = id; showProgChart(id); }

async function showProgChart(id) {
  const isName = id.startsWith('n:');
  const displayName = isName ? id.slice(2) : null;
  const allEx = getAllExercises();
  const templateEx = !isName ? allEx.find(e => e.id === id.slice(2)) : null;
  const label = displayName || templateEx?.name || 'Exercise';

  const overlay = document.createElement('div');
  overlay.className = 'prog-chart-overlay open';
  overlay.id = 'progChartOverlay';
  overlay.onclick = e => { if (e.target === overlay) closeProgChart(); };
  overlay.innerHTML = `
    <div class="prog-chart-sheet">
      <div class="prog-chart-header">
        <div class="prog-chart-title">${label}</div>
        <button class="prog-chart-close" onclick="closeProgChart()">×</button>
      </div>
      <div class="prog-chart-bars" id="progChartBars">
        <div class="empty" style="padding:40px 0;font-size:12px">Loading...</div>
      </div>
    </div>`;
  document.body.appendChild(overlay);

  // Fetch data
  try {
    let pts;
    if (isName) {
      pts = await api('GET', `/api/users/${user.id}/progress-by-name/${encodeURIComponent(displayName)}`);
    } else {
      pts = await api('GET', `/api/users/${user.id}/progress/${id.slice(2)}`);
    }
    renderProgChartBars(pts);
  } catch (e) {
    document.getElementById('progChartBars').innerHTML = '<div class="empty" style="padding:24px;font-size:12px">Error loading data.</div>';
  }
}

function renderProgChartBars(pts) {
  const container = document.getElementById('progChartBars');
  if (!container) return;

  if (!pts.length) {
    container.innerHTML = '<div class="empty" style="padding:24px;font-size:12px">No data yet.</div>';
    return;
  }

  // Group by week, find max weight per week
  const byWeek = {};
  for (const p of pts) {
    if (!byWeek[p.week_num] || p.weight_lbs > byWeek[p.week_num].weight) {
      byWeek[p.week_num] = { weight: p.weight_lbs, reps: p.reps };
    }
  }
  const entries = Object.entries(byWeek).sort((a, b) => +a[0] - +b[0]);
  const maxW = Math.max(...entries.map(e => e[1].weight));

  let h = '';
  for (let w = 1; w <= 4; w++) {
    const d = byWeek[w];
    const pct = d && maxW > 0 ? Math.round(d.weight / maxW * 100) : 0;
    h += `<div class="prog-bar-col">
      <div class="prog-bar-val">${d ? d.weight + ' lb' : '—'}</div>
      <div class="prog-bar-reps">${d && d.reps ? d.reps + ' rep' : '—'}</div>
      <div class="prog-bar-v-wrap">
        <div class="prog-bar-v" style="height:${pct}%"></div>
      </div>
      <div class="prog-bar-wk">W${w}</div>
    </div>`;
  }
  container.innerHTML = h;
}

function closeProgChart() {
  document.getElementById('progChartOverlay')?.remove();
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function showModal(title, items) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'modal-overlay';
  overlay.onclick = e => { if (e.target === overlay) closeModal(); };

  let inner = `<div class="modal-sheet"><div class="modal-title">${title}</div>`;
  items.forEach((item, i) => {
    if (item.disabled) {
      inner += `<div style="font-size:12px;color:var(--t2);padding:8px 0">${item.label}</div>`;
    } else {
      inner += `<button class="modal-btn ${item.cls || ''}" onclick="_modalAction(${i})">${item.label}</button>`;
    }
  });
  inner += `</div>`;
  overlay.innerHTML = inner;
  overlay._actions = items.map(i => i.action);
  document.body.appendChild(overlay);
}

function _modalAction(i) {
  const overlay = document.getElementById('modal-overlay');
  const action = overlay?._actions?.[i];
  closeModal();
  if (action) action();
}

function closeModal() {
  document.getElementById('modal-overlay')?.remove();
}

// ── Nav ───────────────────────────────────────────────────────────────────────
async function setW(w) { W = w; addSectionOpen = false; renameSectionId = null; substitutions = {}; await Promise.all(routine.days.map(d => loadSess(w, d.id))); renderHeader(); rc(); }
async function setD(d) { D = d; open = {}; addSectionOpen = false; addExSection = null; renameSectionId = null; substitutions = {}; await loadSess(W, d); renderHeader(); rc(); }
function switchTab(t) {
  tab = t; addSectionOpen = false; addExSection = null; renameSectionId = null;
  const ts = ['workout', 'history', 'progress', 'settings'];
  document.querySelectorAll('.nav-btn').forEach((b, i) => b.classList.toggle('on', ts[i] === t));
  renderHeader();
  rc();
}
function rc() {
  if (tab === 'workout') renderWorkout();
  else if (tab === 'history') renderHistory();
  else if (tab === 'settings') renderSettings();
  else renderProgress();
}

// ── Settings Tab ───────────────────────────────────────────────────────────────
function renderSettings() {
  const content = document.getElementById('content');
  const currentTheme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
  const currentAccent = localStorage.getItem('lift-accent') || DEFAULT_ACCENT;

  let h = `<div class="settings-panel">`;

  // Theme toggle
  h += `<div class="section-lbl"><span>Appearance</span></div>`;
  h += `<div class="theme-toggle">`;
  h += renderThemeCard('light', 'Light', currentTheme);
  h += renderThemeCard('dark', 'Dark', currentTheme);
  h += `</div>`;

  // Accent color grid
  h += `<div class="section-lbl"><span>Accent Color</span></div>`;
  h += `<div class="accent-grid">`;
  for (const [hex, preset] of Object.entries(ACCENT_PRESETS)) {
    const isSelected = hex === currentAccent;
    h += `<button class="accent-swatch${isSelected ? ' on' : ''}"
            onclick="setAccent('${hex}')"
            style="background:${hex}"
            title="${preset.label}"
            aria-label="${preset.label} accent color">
            <span class="accent-check">\u2713</span>
          </button>`;
  }
  h += `</div>`;

  // Footer
  h += `<div class="settings-footer">LIFT &middot; Your workout tracker</div>`;
  h += `</div>`;

  content.innerHTML = h;
}

function renderThemeCard(theme, label, currentTheme) {
  const isActive = theme === currentTheme;
  return `<button class="theme-card${isActive ? ' on' : ''}" onclick="setTheme('${theme}')" aria-label="${label} theme">
    <div class="theme-preview theme-preview-${theme}">
      <div class="tp-bar"></div>
      <div class="tp-card"></div>
      <div class="tp-card short"></div>
    </div>
    <span class="theme-label">${label}</span>
    <span class="theme-check">\u2713</span>
  </button>`;
}

function setTheme(theme) {
  if (theme === 'dark') {
    document.documentElement.classList.add('dark');
  } else {
    document.documentElement.classList.remove('dark');
  }
  localStorage.setItem('lift-theme', theme);
  if (tab === 'settings') renderSettings();
}

function setAccent(hex) {
  const preset = ACCENT_PRESETS[hex];
  if (!preset) return;
  const s = document.documentElement.style;
  s.setProperty('--accent', preset.base);
  s.setProperty('--accent-dark', preset.dark);
  s.setProperty('--accent-soft', preset.soft);
  localStorage.setItem('lift-accent', hex);
  if (tab === 'settings') renderSettings();
}

// ── Boot ──────────────────────────────────────────────────────────────────────
(async () => {
  // Load saved theme preferences (already applied by head script, but restore accent for JS)
  const savedAccent = localStorage.getItem('lift-accent');
  if (savedAccent && ACCENT_PRESETS[savedAccent]) {
    const s = document.documentElement.style;
    const p = ACCENT_PRESETS[savedAccent];
    s.setProperty('--accent', p.base);
    s.setProperty('--accent-dark', p.dark);
    s.setProperty('--accent-soft', p.soft);
  }

  const saved = localStorage.getItem('lift-user');
  if (saved) {
    try {
      user = JSON.parse(saved);
      await initApp();
    } catch (e) {
      localStorage.removeItem('lift-user');
    }
  }
})();
</script>
